services:
  db:
      image: mariadb:latest
      container_name: ${NAMESPACE}_db
      working_dir: /app
      restart: always
      environment:
        MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-password}
        MARIADB_DATABASE: ${NAMESPACE}_db
        MARIADB_USER: ${NAMESPACE}
        MARIADB_PASSWORD: ${DB_PASSWORD:-password}
      volumes:
        - wikolabs_mariadb_data:/var/lib/mysql
      ports:
        - "3306:3306"
      healthcheck:
        test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
        interval: 10s
        timeout: 5s
        retries: 5
        start_period: 30s
      networks:
        - wikolabs-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${NAMESPACE}_app
    working_dir: /app
    restart: always
    environment:
      - APP_ENV=${APP_ENV:-development}
      # DB connection for Next.js
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=${NAMESPACE}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - DB_NAME=${NAMESPACE}_db
      # Admin setup
      - ADMIN_SETUP_KEY=${ADMIN_SETUP_KEY:-wikolabs-setup-2026}
    volumes:
      - ../:/app
    command: >
      /bin/bash -c "
        if [[ \${APP_ENV} == 'production' || \${APP_ENV} == 'staging' ]]; then
          echo 'Using APP_ENV=${APP_ENV}';
          echo 'Installing project dependencies ...';
          bun install;
          echo 'Building production ready environment ...';
          bun run build;
          echo 'Starting the server ...';
          bun run start;
        else
          echo 'Using APP_ENV=development';
          echo 'Installing project dependencies ...';
          bun install;
          echo 'Running dev environment ...';
          bun run dev;
        fi
      "
    ports:
      - "3000:3000"

    depends_on:
      db:
        condition: service_healthy

    networks:
      - wikolabs-network

volumes:
  wikolabs_mariadb_data:

networks:
  wikolabs-network:
    name: wikolabs-network