<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <!-- Outer ring -->
  <circle cx="40" cy="40" r="38" stroke="#FF9900" stroke-width="3.5" fill="none"/>
  <!-- Central node -->
  <circle cx="40" cy="40" r="7" fill="#FF9900"/>
  <!-- Top node -->
  <circle cx="40" cy="14" r="5" fill="#FF9900"/>
  <!-- Bottom-left node -->
  <circle cx="18" cy="60" r="5" fill="#FF9900"/>
  <!-- Bottom-right node -->
  <circle cx="62" cy="60" r="5" fill="#FF9900"/>
  <!-- Connectors center → top -->
  <line x1="40" y1="33" x2="40" y2="19" stroke="#FF9900" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Connectors center → bottom-left -->
  <line x1="34" y1="45" x2="21" y2="56" stroke="#FF9900" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Connectors center → bottom-right -->
  <line x1="46" y1="45" x2="59" y2="56" stroke="#FF9900" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Secondary nodes on connections -->
  <circle cx="40" cy="26" r="3" fill="#FF9900" opacity="0.6"/>
  <circle cx="27" cy="51" r="3" fill="#FF9900" opacity="0.6"/>
  <circle cx="53" cy="51" r="3" fill="#FF9900" opacity="0.6"/>
</svg>
