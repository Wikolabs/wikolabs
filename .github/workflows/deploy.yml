name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build Next.js
        run: bun run build

      - name: Copy build to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.WIKOLABS_VM_HOST }}
          username: ${{ secrets.WIKOLABS_VM_USER }}
          key: ${{ secrets.WIKOLABS_VM_SSH_KEY }}
          source: ".next/"
          target: "~/wikolabs/"
          overwrite: true

      - name: Pull code and restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.WIKOLABS_VM_HOST }}
          username: ${{ secrets.WIKOLABS_VM_USER }}
          key: ${{ secrets.WIKOLABS_VM_SSH_KEY }}
          script: |
            cd ~/wikolabs
            git pull origin main
            docker compose -p wikolabs --env-file .env -f docker/docker-compose.yml restart app
            echo "Deployed at $(date)"