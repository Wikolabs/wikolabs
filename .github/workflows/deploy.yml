name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build Next.js
        run: bun run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.WIKOLABS_VM_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.WIKOLABS_VM_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copy build to VM
        run: |
          tar czf /tmp/next-build.tar.gz .next/
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            /tmp/next-build.tar.gz \
            ${{ secrets.WIKOLABS_VM_USER }}@${{ secrets.WIKOLABS_VM_HOST }}:~/wikolabs/
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.WIKOLABS_VM_USER }}@${{ secrets.WIKOLABS_VM_HOST }} \
            "cd ~/wikolabs && rm -rf .next-new && mkdir .next-new && tar xzf next-build.tar.gz -C .next-new --strip-components=1 && rm -f next-build.tar.gz"

      - name: Pull code and restart
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.WIKOLABS_VM_USER }}@${{ secrets.WIKOLABS_VM_HOST }} << 'DEPLOY'
            set -e
            cd ~/wikolabs
            git pull origin main

            # Verify staged build exists
            if [ ! -d .next-new ]; then
              echo "Missing staged .next-new" >&2
              exit 1
            fi

            # Swap: old → backup, new → live
            rm -rf .next-old
            if [ -d .next ]; then mv .next .next-old; fi
            mv .next-new .next

            # Start or restart
            if docker ps --format '{{.Names}}' | grep -q wikolabs_app; then
              make prod-restart
            else
              make prod
            fi

            # Verify app is healthy
            sleep 5
            if docker ps --format '{{.Names}}' | grep -q wikolabs_app; then
              rm -rf .next-old
              echo "Deployed at $(date)"
            else
              echo "App failed to start, rolling back" >&2
              rm -rf .next
              if [ -d .next-old ]; then mv .next-old .next; fi
              make prod-restart || true
              exit 1
            fi
          DEPLOY