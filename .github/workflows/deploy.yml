name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build Next.js
        run: bun run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.WIKOLABS_VM_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.WIKOLABS_VM_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copy build to VM
        run: |
          tar czf /tmp/next-build.tar.gz .next/
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            /tmp/next-build.tar.gz \
            ${{ secrets.WIKOLABS_VM_USER }}@${{ secrets.WIKOLABS_VM_HOST }}:~/wikolabs/
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.WIKOLABS_VM_USER }}@${{ secrets.WIKOLABS_VM_HOST }} \
            "cd ~/wikolabs && rm -rf .next-new && tar xzf next-build.tar.gz && mv .next .next-new && rm -f next-build.tar.gz"

      - name: Pull code and restart
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.WIKOLABS_VM_USER }}@${{ secrets.WIKOLABS_VM_HOST }} \
            'cd ~/wikolabs && git pull origin main && \
             if [ ! -d .next-new ]; then echo "Missing staged .next-new" >&2; exit 1; fi && \
             make prod && \
             rm -rf .next-old && if [ -d .next ]; then mv .next .next-old; fi && mv .next-new .next && \
             if make prod-restart; then rm -rf .next-old && echo "Deployed at $(date)"; \
             else echo "Restart failed, rolling back" >&2; \
               mv .next .next-failed && if [ -d .next-old ]; then mv .next-old .next; fi && \
               make prod-restart || true; exit 1; fi'